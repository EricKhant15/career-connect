<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Posts - Company</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brandRow">
      <div class="logo"></div><div class="brandText">CareerConnect</div><div class="pill">Company</div>
    </div>

    <div class="profile">
      <div class="avatar">C</div>
      <div><b>Company</b><small>Company Account</small></div>
    </div>

    <div class="navTitle">Menu</div>
    <nav class="nav">
      <a href="company_dashboard.html">Dashboard</a>
      <a class="active" href="company_jobposts.html">Job Posts</a>
      <a href="company_applicants.html">Applicants</a>
    </nav>

    <div class="navFooter">
      <a href="login.html">Switch Role</a>
      <a href="index.html">Sign Out</a>
    </div>
  </aside>

  <main class="main">
    <!-- Topbar -->
    <div class="topbar">
      <div class="search" style="min-width:360px;">
        <input id="jobSearch" placeholder="Search job title..." />
      </div>
      <div class="actions">
        <span class="chip" id="jobCountChip">0 jobs</span>
        <a class="btn btn-primary" href="company_post.html">Create a new Job Posting</a>
      </div>
    </div>

    <div class="grid">
      <!-- LEFT: Job list -->
      <div class="card" style="grid-column: span 4;">
        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
          <h3 style="margin:0;">Jobs</h3>
          <span class="chip" id="openCount">Open: 0</span>
        </div>

        <div id="jobList" style="margin-top:12px; display:flex; flex-direction:column; gap:10px;"></div>
      </div>

      <!-- RIGHT: Job details -->
      <div class="card" style="grid-column: span 8;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;">
          <div>
            <h2 style="margin:0;" id="jobTitle">—</h2>
            <p style="margin-top:6px; color:var(--muted);" id="jobSubtitle">—</p>
            <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;">
              <span class="chip" id="metaPosted">Posted: —</span>
              <span class="chip" id="metaDeadline">Deadline: —</span>
            </div>
          </div>

          <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
            <span class="status good" id="jobStatusPill">—</span>
          </div>
        </div>

        <div class="grid" style="margin-top:14px;">
          <div class="card" style="grid-column: span 12;">
            <h3>Job Overview</h3>
            <div style="margin-top:10px; line-height:1.9; color:var(--muted);">
              <b style="color:var(--text);">Job ID:</b> <span id="metaId">—</span><br/>
              <b style="color:var(--text);">Mode:</b> <span id="metaMode">—</span><br/>
              <b style="color:var(--text);">Allowance:</b> <span id="metaAllowance">—</span><br/>
              <b style="color:var(--text);">Openings:</b> <span id="metaOpenings">—</span>
            </div>
          </div>

          <div class="card" style="grid-column: span 12;">
            <h3>Job Description</h3>
            <p id="jobDesc" style="margin-top:8px; line-height:1.8; white-space:pre-wrap;"></p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
  const companyId = Number(localStorage.getItem("company_id"));
  if (!companyId) {
    alert("Not logged in as company");
    window.location.href = "login.html";
  }

  let jobs = [];
  let selectedPostId = null;

  function statusClass(status){
    return (status === "Active") ? "good" : "warn";
  }

  async function loadJobs(){
    try {
      const r = await fetch(`/api/company/${companyId}/internships`);
      const out = await r.json();

      if (!r.ok || !out.ok) {
        alert("❌ " + (out.error || "Failed to load jobs"));
        return;
      }

      jobs = out.posts || [];
      selectedPostId = jobs[0]?.post_id ?? null;
      renderAll();
    } catch (e) {
      alert("❌ Cannot reach backend");
      console.error(e);
    }
  }

  function filteredJobs(){
    const q = (document.getElementById("jobSearch").value || "").toLowerCase().trim();
    if(!q) return jobs;
    return jobs.filter(j => (String(j.title || "").toLowerCase().includes(q)));
  }

  function getSelectedJob(){
    if (!jobs.length) return null;
    return jobs.find(j => j.post_id === selectedPostId) || jobs[0] || null;
  }

  function renderJobList(list){
    const el = document.getElementById("jobList");

    if (!jobs.length) {
      el.innerHTML = `<small style="color:var(--muted);">No job postings yet. Click "Create a new Job Posting".</small>`;
      return;
    }

    el.innerHTML = list.map((j) => {
      const isActive = (j.post_id === selectedPostId);
      return `
        <div onclick="selectPost(${j.post_id})"
             style="padding:12px; border:1px solid var(--border); border-radius:16px;
                    background:${isActive ? "rgba(99,102,241,.12)" : "rgba(255,255,255,.04)"}; cursor:pointer;">
          <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px;">
            <div>
              <b style="display:block;">${escapeHtml(j.title || "-")}</b>
              <small style="color:var(--muted);">${escapeHtml(j.work_mode || "-")} • ${Number(j.stipend || 0)} THB</small>
            </div>
            <span class="status ${statusClass(j.status)}">${escapeHtml(j.status || "-")}</span>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderDetails(j){
    if (!j) return;

    document.getElementById("jobTitle").textContent = j.title || "-";
    const pill = document.getElementById("jobStatusPill");
    pill.className = "status " + statusClass(j.status);
    pill.textContent = j.status || "-";

    document.getElementById("metaId").textContent = j.post_id ?? "-";
    document.getElementById("metaPosted").textContent = "Posted: " + (j.posted_date || "-");
    document.getElementById("metaDeadline").textContent = "Deadline: " + (j.deadline || "-");
    document.getElementById("metaMode").textContent = j.work_mode || "-";
    document.getElementById("metaAllowance").textContent = (j.stipend ?? 0) + " THB";
    document.getElementById("metaOpenings").textContent = j.openings ?? "-";

    // ✅ this will work once backend returns description
    document.getElementById("jobDesc").textContent =
      (j.description && String(j.description).trim()) ? j.description : "—";
  }

  function selectPost(postId){
    selectedPostId = postId;
    renderAll();
  }

  function renderAll(){
    const list = filteredJobs();

    document.getElementById("jobCountChip").textContent = jobs.length + " jobs";
    document.getElementById("openCount").textContent =
      "Open: " + jobs.filter(x => x.status === "Active").length;

    // If search filtered out selected job, pick first visible
    if (list.length && !list.some(x => x.post_id === selectedPostId)) {
      selectedPostId = list[0].post_id;
    }

    renderJobList(list);
    renderDetails(getSelectedJob());
  }

  function escapeHtml(s) {
    return String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  document.getElementById("jobSearch").addEventListener("input", renderAll);

  loadJobs();
</script>

</body>
</html>
