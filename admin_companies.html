<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manage Companies</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brandRow">
      <div class="logo"></div><div class="brandText">CareerConnect</div><div class="pill">Admin</div>
    </div>

    <div class="profile">
      <div class="avatar">A</div>
      <div><b>Admin1</b><small>System Admin</small></div>
    </div>

    <div class="navTitle">Menu</div>
    <nav class="nav">
      <a href="admin_dashboard.html">Dashboard</a>
      <a class="active" href="admin_companies.html">Companies</a>
    </nav>

    <div class="navFooter">
      <a href="login.html">Switch Role</a>
      <a href="index.html">Sign Out</a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="search" style="min-width:360px;">
        <input id="q" placeholder="Search company name, industry, email..." />
      </div>
      <span class="chip">Approve / Reject company accounts</span>
    </div>

    <div class="card">
      <h2 style="margin:0;">Manage Companies</h2>
      <p style="color:var(--muted); margin-top:6px;">
        Review company verification status before they can post internships.
      </p>

      <table class="table" style="margin-top:12px;">
        <thead>
          <tr>
            <th>Company</th>
            <th>Industry</th>
            <th>Contact</th>
            <th>Status</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>
</div>

<script>
  // For demo, we hardcode admin id = 1 (you can change later)
  const ADMIN_ID = 1;

  let companies = [];

  function statusClass(s){
    if(s === "Approved") return "ok";
    if(s === "Rejected") return "warn";
    return "good"; // Pending
  }

  async function loadCompanies() {
    const r = await fetch("/api/admin/companies");
    const out = await r.json();
    if (!r.ok || !out.ok) throw new Error(out.error || "Failed to load companies");
    companies = out.companies || [];
    render();
  }

  function filteredList() {
    const q = (document.getElementById("q").value || "").toLowerCase().trim();
    if (!q) return companies;
    return companies.filter(c =>
      (`${c.company_name} ${c.industry || ""} ${c.email}`).toLowerCase().includes(q)
    );
  }

  function render(){
    const list = filteredList();

    document.getElementById("rows").innerHTML = list.map((c) => `
      <tr>
        <td><b>${escapeHtml(c.company_name)}</b></td>
        <td>${escapeHtml(c.industry || "-")}</td>
        <td>${escapeHtml(c.email)}</td>
        <td><span class="status ${statusClass(c.verified_status)}">${escapeHtml(c.verified_status)}</span></td>
        <td style="text-align:right;">
          <button class="btn" onclick="viewCompany(${c.company_id})">View</button>
          <button class="btn btn-primary" onclick="setStatus(${c.company_id}, 'Approved')">Approve</button>
          <button class="btn btn-ghost" onclick="setStatus(${c.company_id}, 'Rejected')">Reject</button>
        </td>
      </tr>
    `).join("") || `<tr><td colspan="5" style="color:var(--muted);">No results.</td></tr>`;
  }

  async function setStatus(companyId, status){
    try {
      const r = await fetch("/api/admin/companies/status", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ company_id: companyId, status, admin_id: ADMIN_ID })
      });
      const out = await r.json();
      if (!r.ok || !out.ok) throw new Error(out.error || "Update failed");

      // Update local list so UI refreshes without reloading everything
      const idx = companies.findIndex(x => x.company_id === companyId);
      if (idx !== -1) companies[idx].verified_status = out.company.verified_status;

      render();
      alert(`✅ ${out.company.company_name} is now ${out.company.verified_status}`);
    } catch (e) {
      alert("❌ " + (e.message || "Update failed"));
    }
  }

  function viewCompany(companyId){
    const c = companies.find(x => x.company_id === companyId);
    if (!c) return alert("Company not found");
    alert(
      `Company Details\n\n` +
      `Name: ${c.company_name}\n` +
      `Industry: ${c.industry || "-"}\n` +
      `Email: ${c.email}\n` +
      `Status: ${c.verified_status}\n`
    );
  }

  function escapeHtml(s) {
    return String(s ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  document.getElementById("q").addEventListener("input", render);

  // initial load from DB
  loadCompanies().catch(err => {
    document.getElementById("rows").innerHTML =
      `<tr><td colspan="5" style="color:var(--muted);">Failed to load companies: ${escapeHtml(err.message)}</td></tr>`;
  });
</script>


</body>
</html>
