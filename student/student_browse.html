<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browse Internships - CareerConnect</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brandRow">
      <div class="logo"></div>
      <div class="brandText">CareerConnect</div>
      <div class="pill">Student</div>
    </div>

<div class="profile">
  <div class="avatar" id="avatar">?</div>
  <div>
    <b id="studentName">Student</b>
    <small>Student Account</small>
  </div>
</div>


    <div class="navTitle">Menu</div>
    <nav class="nav">
      <a href="student_dashboard.html">Dashboard</a>

      <a href="#" class="nav-toggle" onclick="toggleInternships(event)">
        Internships <span class="chevron">▾</span>
      </a>

      <a href="student_applications.html">Applications</a>
      <a href="student_documents.html">Documents</a>
    </nav>

    <div class="navFooter">
      <a href="../login.html">Switch Role</a>
      <a href="../index.html">Sign Out</a>
    </div>
  </aside>

  <!-- Main -->


    <!-- Result chips -->
    <div class="section" id="chipsBox" style="display:none;">
      <div class="sectionHeader">
        <b>Active Filters</b>
        <span class="chip" id="countChip">0 results</span>
      </div>
      <div class="chips" id="chips"></div>
    </div>

    <!-- Cards result -->
    <div class="section">
      <div class="sectionHeader">
        <b>Browse Intern</b>
        <span class="chip" id="resultCount">0 results</span>
      </div>

      <div class="grid" id="cardsGrid" style="margin-top:10px;"></div>
    </div>
  </main>
</div>

<script>
  // ✅ Replace prototype list with DB data
  let internships = [];

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function formatDate(v){
    if(!v) return "-";
    try {
      const d = new Date(v);
      if (isNaN(d.getTime())) return String(v);
      return d.toLocaleDateString();
    } catch { return String(v); }
  }

  function cardHTML(x){
    const title = `${x.company_name} (${x.title})`;
    const stipend = (x.stipend == null || x.stipend === "") ? "Not provided" : "Provided";
    return `
      <div class="card" style="grid-column: span 4;">
        <div class="cardTitle">
          <div>
            <h3>${escapeHtml(title)}</h3>
            <p>${escapeHtml(x.work_mode || "-")}</p>
          </div>
          <span class="status good">Active</span>
        </div>

        <div style="margin-top:12px; color:var(--muted); font-size:14px; line-height:1.9;">
          <b style="color:var(--text);">Company :</b> ${escapeHtml(x.company_name)}<br/>
          <b style="color:var(--text);">Mode :</b> ${escapeHtml(x.work_mode || "-")}<br/>
          <b style="color:var(--text);">Allowance :</b> ${escapeHtml(stipend)}<br/>
          <b style="color:var(--text);">Stipend :</b> ${escapeHtml(String(x.stipend ?? 0))}<br/>
          <b style="color:var(--text);">Openings :</b> ${escapeHtml(String(x.openings ?? "-"))}<br/>
          <b style="color:var(--text);">Deadline :</b> ${escapeHtml(formatDate(x.deadline))}<br/>
          <b style="color:var(--text);">Post ID :</b> ${escapeHtml(String(x.post_id))}
        </div>

        <div style="margin-top:14px;">
          <a class="btn btn-primary" href="#" onclick="goApply(${x.post_id}); return false;">Apply</a>
          <a class="btn" href="#" onclick="goApply(${x.post_id}); return false;" style="margin-left:8px;">View</a>
        </div>
      </div>
    `;
  }

  function getCheckedValues(cls){
    return [...document.querySelectorAll(cls + ":checked")].map(x => x.value);
  }

  function applyFilters(){
    const q = (document.getElementById("q").value || "").toLowerCase();

    const mode = getCheckedValues(".fMode");
    const all  = getCheckedValues(".fAll");

    let filtered = internships.filter(x => {
      const hay = (x.title + " " + x.company_name + " " + x.description).toLowerCase();
      if(q && !hay.includes(q)) return false;

      // mode filter
      if(mode.length && !mode.includes(x.work_mode)) return false;

      // allowance filter: based on stipend null/0
      if(all.length){
        const hasAllowance = !(x.stipend == null || Number(x.stipend) === 0);
        if(all.includes("Provided") && !hasAllowance) return false;
        if(all.includes("Not provided") && hasAllowance) return false;
      }

      return true;
    });

    render(filtered);
    renderChips({q, mode, all}, filtered.length);
  }

  function clearFilters(){
    document.getElementById("q").value = "";
    document.querySelectorAll("input[type=checkbox]").forEach(cb => cb.checked = false);
    render(internships);
    document.getElementById("chipsBox").style.display = "none";
  }

  function render(list){
    const grid = document.getElementById("cardsGrid");
    grid.innerHTML = list.map(cardHTML).join("") || `
      <div class="card" style="grid-column: span 12;">
        <h3>No results found</h3>
        <p>Try clearing filters or selecting different options.</p>
      </div>
    `;
    document.getElementById("resultCount").textContent = list.length + " results";
    const countChip = document.getElementById("countChip");
    if(countChip) countChip.textContent = list.length + " results";
  }

  function renderChips(filters, count){
    const chips = [];
    if(filters.q) chips.push("Search: " + filters.q);
    (filters.mode || []).forEach(v => chips.push("Mode: " + v));
    (filters.all || []).forEach(v => chips.push("Allowance: " + v));

    const box = document.getElementById("chipsBox");
    const wrap = document.getElementById("chips");
    wrap.innerHTML = chips.map(t => `<span class="chip">${escapeHtml(t)}</span>`).join("");

    box.style.display = chips.length ? "block" : "none";
    document.getElementById("countChip").textContent = count + " results";
  }

  async function loadInternships(){
    try {
      const r = await fetch("/api/internships");
      const out = await r.json();
      if(!r.ok || !out.ok) {
        alert("Failed to load internships: " + (out.error || "unknown error"));
        return;
      }
      internships = out.posts || [];
      render(internships);
    } catch (e) {
      alert("Cannot reach backend");
      console.error(e);
    }
  }

  function goApply(postId){
    // store selected post_id so apply page knows what to submit
    localStorage.setItem("selected_post_id", String(postId));
    window.location.href = "student_apply.html";
  }

  // initial
  loadInternships();
</script>

<script src="../js/sidebar.js"></script>

<script>
  const student = JSON.parse(localStorage.getItem("student"));

  if(student){
    document.getElementById("studentName").textContent =
      student.full_name || student.name || "Student";

    document.getElementById("avatar").textContent =
      (student.full_name || student.name || "S")[0].toUpperCase();
  }
</script>

</body>
</html>
