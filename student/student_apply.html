<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apply Internship - CareerConnect</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/sidebar.js" defer></script>

  <style>
    #internshipSubmenu { display: block; }
  </style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brandRow">
      <div class="logo"></div>
      <div class="brandText">CareerConnect</div>
      <div class="pill">Student</div>
    </div>

    <div class="profile">
      <div class="avatar">E</div>
      <div>
        <b>Student</b>
        <small>Student Account</small>
      </div>
    </div>

    <div class="navTitle">Menu</div>
    <nav class="nav">
      <a href="student_dashboard.html">Dashboard</a>

      <a href="#" class="nav-toggle" onclick="toggleInternships(event)">
        Internships <span class="chevron">▾</span>
      </a>

      <a href="student_applications.html">Applications</a>
      <a href="student_documents.html">Documents</a>
    </nav>

    <div class="navFooter">
      <a href="../login.html">Switch Role</a>
      <a href="../index.html">Sign Out</a>
    </div>
  </aside>

  <main class="main">

    <div class="section" style="max-width: 980px;">
      
      <form id="applyForm">
        <div class="grid" style="margin-top:12px;">
          <div class="card" style="grid-column: span 6;">
            <div class="label">Full Name</div>
            <input id="full_name" class="input" placeholder="(optional)" />
          </div>

          <div class="card" style="grid-column: span 6;">
            <div class="label">Email</div>
            <input id="email" class="input" placeholder="(optional)" />
          </div>

          <div class="card" style="grid-column: span 12;">
            <div class="label">Short Motivation (optional)</div>
            <textarea id="motivation" class="textarea" placeholder="Why are you a good fit?"></textarea>
          </div>
        </div>

        <div style="margin-top:14px; display:flex; gap:10px; flex-wrap:wrap;">
          <button class="btn btn-primary" type="submit">Submit Application</button>
          <a class="btn btn-ghost" href="student_browse.html">Back to Browse</a>
        </div>
      </form>
    </div>
  </main>
</div>

<script>
  const studentId = Number(localStorage.getItem("student_id"));
  if (!studentId) {
    alert("Not logged in as student");
    window.location.href = "../login.html";
  }

  const selectedPostId = localStorage.getItem("selected_post_id");

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  document.getElementById("applyForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const postId = Number(selectedPostId);
    if (!postId) {
      alert("No internship selected");
    return;
}


    const motivation = document.getElementById("motivation").value.trim();

    try {
      const r = await fetch("/api/applications", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          student_id: studentId,
          post_id: postId,
          motivation_letter: motivation
        })
      });

      const out = await r.json();

      if (!r.ok || !out.ok) {
        alert("❌ " + (out.error || "Failed to apply"));
        return;
      }

      alert("✅ Application submitted!");
      localStorage.removeItem("selected_post_id");
      window.location.href = "student_dashboard.html";
    } catch (err) {
      alert("❌ Cannot reach backend");
      console.error(err);
    }
  });
</script>

</body>
</html>
