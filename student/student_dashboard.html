<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Dashboard - CareerConnect</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <div class="app">
    <!-- Sidebar (STUDENT) -->
    <aside class="sidebar">
      <div class="brandRow">
        <div class="logo"></div>
        <div class="brandText">CareerConnect</div>
        <div class="pill">Student</div>
      </div>

      <a class="profile profileLink" href="student_profile.html" style="text-decoration:none;">
        <div class="avatar" title="Open Profile" id="avatarLetter">S</div>
        <div>
          <b id="studentLabel">Student</b>
          <small>Student Account</small>
        </div>
      </a>

      <div class="navTitle">Menu</div>
      <nav class="nav">
        <a class="active" href="student_dashboard.html">Dashboard</a>
        <a href="student_browse.html">Internships</a>
        <a href="student_applications.html">Applications</a>
        <a href="student_documents.html">Documents</a>
      </nav>

      <div class="navFooter">
        <a href="../login.html">Switch Role</a>
        <a href="../index.html">Sign Out</a>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="topbar">
        <div class="search">
          <span style="color:var(--muted);font-weight:800;">🔎</span>
          <input placeholder="Search internships, companies, skills..." />
        </div>

        <!-- ✅ Added: Greeting + DB status pill -->
        <div class="actions" style="display:flex; align-items:center; gap:10px;">
          <div id="helloTitle" style="font-weight:800;">Hello, Student</div>
          <span id="modePill" class="status warn">Loading…</span>
        </div>
      </div>

      <!-- ✅ KPI (3 only) -->
      <div class="metric">
        <div class="kpi">
          <b id="kpiSubmitted">0</b>
          <small>Applications Submitted</small>
        </div>

        <div class="kpi">
          <b id="kpiOffers">0</b>
          <small>Offers (Offered + Accepted)</small>
        </div>

        <div class="kpi">
          <b id="kpiRejected">0</b>
          <small>Rejections</small>
        </div>
      </div>
    </main>
  </div>

<script>
  const studentId = Number(localStorage.getItem("student_id"));
  const studentName = localStorage.getItem("student_name") || "Student";

  if (!studentId) {
    alert("Student not logged in. Please login again.");
    window.location.href = "../login.html";
  }

  // safe set text (avoid crashing if element missing)
  function setText(id, text) {
    const el = document.getElementById(id);
    if (el) el.textContent = text;
  }
  function setPill(status, text) {
    const el = document.getElementById("modePill");
    if (!el) return;
    el.className = "status " + status; // ok | warn
    el.textContent = text;
  }

  setText("studentLabel", studentName);
  setText("avatarLetter", (studentName || "S").trim().charAt(0).toUpperCase());
  setText("helloTitle", "Hello, " + studentName);

  async function loadStats() {
    try {
      // ✅ Use relative URL (works on localhost + deployments)
      const r = await fetch(`/api/student/${studentId}/dashboard`);
      const out = await r.json();

      if (!r.ok || !out.ok) {
        setPill("warn", "DB Error");
        console.error("Dashboard API error:", out);
        return;
      }

      const s = out.stats || {};
      setText("kpiSubmitted", s.submitted ?? 0);
      setText("kpiOffers", s.offers ?? 0);
      setText("kpiRejected", s.rejected ?? 0);

      setPill("ok", "Connected to DB");
    } catch (e) {
      setPill("warn", "Cannot reach backend");
      console.error(e);
    }
  }

  loadStats();
</script>
  
</body>
</html>
