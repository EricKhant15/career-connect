<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Post Internship - CareerConnect</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>CareerConnect</div>
        <div class="badge">Company • Post</div>
      </div>
      <a class="btn btn-ghost" href="company_dashboard.html">Back</a>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 6px;">Create Internship Posting</h2>
      <p style="margin:0 0 16px; color:var(--muted);">
        This form is for demonstration (no database submission yet).
      </p>

      <div class="form">
        <div>
          <div class="label">Company Name</div>
          <input class="input" placeholder="e.g., Shopee Thailand" />
        </div>

        <div>
          <div class="label">Job Title</div>
          <input class="input" placeholder="e.g., Software Intern" />
        </div>

        <div>
          <div class="label">Location</div>
          <input class="input" placeholder="e.g., Bangkok" />
        </div>

        <div>
          <div class="label">Description</div>
          <textarea class="textarea" placeholder="Responsibilities, requirements, etc."></textarea>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <a class="btn btn-primary" href="company_dashboard.html">Post (Prototype)</a>
          <a class="btn btn-ghost" href="company_dashboard.html">Cancel</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
