<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Applicants - Company</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brandRow">
      <div class="logo"></div><div class="brandText">CareerConnect</div><div class="pill">Company</div>
    </div>

    <div class="profile">
      <div class="avatar">C</div>
      <div><b>Company</b><small>Company Account</small></div>
    </div>

    <div class="navTitle">Menu</div>
    <nav class="nav">
      <a href="company_dashboard.html">Dashboard</a>
      <a href="company_jobposts.html">Job Posts</a>
      <a class="active" href="company_applicants.html">Applicants</a>
    </nav>

    <div class="navFooter">
      <a href="login.html">Switch Role</a>
      <a href="index.html">Sign Out</a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      
        <h2>Applicants</h2>
      
    </div>

    <!-- simple search -->
    <div class="section" style="margin-top:10px;">
      <div class="card" style="display:flex; gap:12px; align-items:center; justify-content:space-between; flex-wrap:wrap;">
        <div style="display:flex; gap:10px; align-items:center; min-width:280px; flex:1;">
          <span style="color:var(--muted); font-weight:800;">🔎</span>
          <input id="q" placeholder="Search student name, email, job title..." style="width:100%;" />
        </div>
        <span class="chip" id="countChip">0 applicants</span>
      </div>
    </div>
    <button class="btn btn-primary" onclick="sendInterviewInvites()">
  Invite to Interview
</button>
    <div class="section">
      <table class="table">
          <thead>
          <tr>
            <th style="width:40px;">
              <input id="selectAll" type="checkbox" />
            </th>
            <th>App ID</th>
            <th>Student Name</th>
            <th>Email</th>
            <th>Job</th>
            <th>Status</th>
            <th style="text-align:right;">Action</th>
          </tr>
        </thead>
          <tbody id="rows">
          <tr><td colspan="7" style="color:var(--muted);">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </main>
</div>

<script>
  const companyId = Number(localStorage.getItem("company_id"));
  if (!companyId) {
    alert("Not logged in as company");
    window.location.href = "login.html";
  }

  let applicants = [];

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function statusClass(s){
    // map to your existing CSS classes: ok/good/warn
    if (s === "Accepted") return "ok";
    if (s === "Rejected") return "warn";
    if (s === "Under Review" || s === "Shortlisted" || s === "Offered") return "good";
    return "good"; // Submitted, etc.
  }

  async function loadApplicants(){
    try {
      const r = await fetch(`/api/company/${companyId}/applicants`);
      const out = await r.json();
      if (!r.ok || !out.ok) {
        document.getElementById("rows").innerHTML =
          `<tr><td colspan="7" style="color:var(--muted);">Failed to load: ${escapeHtml(out.error || "unknown error")}</td></tr>`;
        return;
      }
      applicants = out.applicants || [];
      render();
    } catch (e) {
      document.getElementById("rows").innerHTML =
        `<tr><td colspan="7" style="color:var(--muted);">Cannot reach backend</td></tr>`;
      console.error(e);
    }
  }

  function filtered(){
    const q = (document.getElementById("q").value || "").toLowerCase().trim();
    if (!q) return applicants;
    return applicants.filter(a => {
      const hay = (
        (a.first_name || "") + " " +
        (a.last_name || "") + " " +
        (a.student_email || "") + " " +
        (a.post_title || "") + " " +
        (a.application_id || "")
      ).toLowerCase();
      return hay.includes(q);
    });
  }

  function render(){
    const list = filtered();
    document.getElementById("countChip").textContent = list.length + " applicants";

    const body = document.getElementById("rows");
    if (!list.length) {
      body.innerHTML = `<tr><td colspan="7" style="color:var(--muted);">No applicants yet.</td></tr>`;
      return;
    }

    body.innerHTML = list.map(a => {
      const name = `${a.first_name || ""} ${a.last_name || ""}`.trim() || "—";
      const status = a.application_status || "Submitted";

      // ✅ View button link (goes to your application detail page)
      const viewHref = `company_application.html?app_id=${encodeURIComponent(a.application_id)}`;

      return `
              <tr>
                <td style="width:40px;">
                  <input class="appSelect" type="checkbox" value="${escapeHtml(a.application_id)}" />
                </td>

                <td>#${escapeHtml(a.application_id)}</td>

                <td class="truncate">${escapeHtml(name)}</td>

                <td class="truncate">${escapeHtml(a.student_email || "-")}</td>

                <td class="truncate">${escapeHtml(a.post_title || "-")}</td>

                <td>
                  <span class="status ${statusClass(status)}">${escapeHtml(status)}</span>
                </td>

                <td style="text-align:right;">
                  <div style="display:flex; gap:8px; align-items:center;">
                    <a class="btn btn-sm" href="${viewHref}">View</a>

                    <select
                      class="input input-sm"
                      onchange="updateStatus(${a.application_id}, this.value)"
                    >
                      ${renderStatusOptions(status)}
                    </select>
                  </div>
                </td>
              </tr>
          `;
    }).join("");
  }

  function renderStatusOptions(current){
    // IMPORTANT: must match your Postgres enum values exactly
    const options = ["Submitted","Shortlisted","Interview","Rejected","Offered","Accepted","Withdrawn"];
    return options.map(s => {
      const sel = (s === current) ? "selected" : "";
      return `<option value="${escapeHtml(s)}" ${sel}>${escapeHtml(s)}</option>`;
    }).join("");
  }

  async function updateStatus(applicationId, status){
    try {
      const r = await fetch(`/api/applications/${applicationId}/status`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status })
      });
      const out = await r.json();
      if (!r.ok || !out.ok) {
        alert("Update failed: " + (out.error || "unknown error"));
        await loadApplicants();
        return;
      }
      // update locally so UI feels instant
      const idx = applicants.findIndex(x => Number(x.application_id) === Number(applicationId));
      if (idx >= 0) applicants[idx].application_status = status;
      render();
    } catch (e) {
      alert("Cannot reach backend");
      console.error(e);
      await loadApplicants();
    }
  }

  document.getElementById("q").addEventListener("input", render);
  document.getElementById("selectAll").addEventListener("change", (e) => {
  const checked = e.target.checked;
  document.querySelectorAll(".appSelect").forEach(cb => cb.checked = checked);
});
  loadApplicants();


  function getCompanyId() {
  return Number(localStorage.getItem("company_id"));
}

function getSelectedApplicationIds() {
  return Array.from(document.querySelectorAll(".appSelect:checked"))
    .map(cb => Number(cb.value))
    .filter(Boolean);
}

async function sendInterviewInvites() {
  const companyId = getCompanyId();
  if (!companyId) {
    alert("Please log in as a company first.");
    window.location.href = "login.html";
    return;
  }

  const ids = getSelectedApplicationIds();
  if (ids.length === 0) {
    alert("Please select at least 1 student/application.");
    return;
  }

  // Simple prompts (fast)
  const scheduledAt = prompt("Enter interview date/time (YYYY-MM-DD HH:MM) or ISO:");
  if (!scheduledAt) return;

  const interviewType = prompt("Interview type (Online / Onsite / Phone) (optional):") || "";
  const locationOrLink = prompt("Location or meeting link (optional):") || "";

  try {
    const r = await fetch(`/api/company/${companyId}/interviews/bulk`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        application_ids: ids,
        scheduled_at: scheduledAt,
        interview_type: interviewType,
        location_or_link: locationOrLink
      })
    });

    const out = await r.json();

    if (!r.ok || !out.ok) {
      alert("❌ " + (out.error || "Failed to send invites"));
      console.error(out);
      return;
    }

    alert(`✅ Interview invites sent to ${out.invited_count} application(s)!`);
    // optionally refresh page data:
    // await loadApplicants();
    // or window.location.reload();
  } catch (e) {
    console.error(e);
    alert("❌ Cannot reach backend");
  }
}
</script>

</body>
</html>
