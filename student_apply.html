<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apply Internship - CareerConnect</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>CareerConnect</div>
        <div class="badge">Student • Apply</div>
      </div>
      <a class="btn btn-ghost" href="student_dashboard.html">Back</a>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 6px;">Internship Application</h2>
      <p style="margin:0 0 16px; color:var(--muted);">
        This form is for demonstration (no database submission yet).
      </p>

      <div class="form">
        <div>
          <div class="label">Full Name</div>
          <input class="input" placeholder="e.g., Eric AU" />
        </div>

        <div>
          <div class="label">Email</div>
          <input class="input" placeholder="e.g., student@au.edu" />
        </div>

        <div>
          <div class="label">Select Internship</div>
          <select class="select">
            <option>Software Engineer Intern - Google Thailand</option>
            <option>Marketing Intern - Shopee</option>
            <option>Data Analyst Intern - SCG</option>
          </select>
        </div>

        <div>
          <div class="label">Short Motivation</div>
          <textarea class="textarea" placeholder="Why are you a good fit?"></textarea>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <a class="btn btn-primary" href="student_dashboard.html">Submit (Prototype)</a>
          <a class="btn btn-ghost" href="student_browse.html">Back to Browse</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
