<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Application - Company</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brandRow">
      <div class="logo"></div><div class="brandText">CareerConnect</div><div class="pill">Company</div>
    </div>

    <div class="profile">
      <div class="avatar">S</div>
      <div><b>Samsung</b><small>Company Account</small></div>
    </div>

    <div class="navTitle">Menu</div>
    <nav class="nav">
      <a href="company_dashboard.html">Dashboard</a>
      <a href="company_jobposts.html">Job Posts</a>
      <a href="company_interview.html">Interview</a>
      <a class="active" href="company_applicants.html">Applicants</a>
    </nav>

    <div class="navFooter">
      <a href="login.html">Switch Role</a>
      <a href="index.html">Sign Out</a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div><h2>Application</h2></div>
      <a class="btn btn-ghost" href="company_applicants.html">Back</a>
    </div>

    <!-- Student basic info -->
    <div class="card" style="margin-bottom:12px;">
      <h3 id="studentName">Student Name</h3>
      <p id="studentEmail" style="color:var(--muted);">student@email.com</p>
    </div>

    <!-- Short Motivation -->
    <div class="card" style="margin-bottom:12px;">
      <h3>Short Motivation</h3>
      <p id="motivationText" style="margin-top:10px; line-height:1.8; white-space:pre-wrap;">
        Loading...
      </p>
    </div>

    <!-- Documents -->
    <div class="grid">
      <div class="card">
        <h3>Student Resume</h3>
        <div id="resumeArea" style="margin-top:10px; color:var(--muted);">Loading...</div>
      </div>

      <div class="card">
        <h3>Student Transcript</h3>
        <div id="transcriptArea" style="margin-top:10px; color:var(--muted);">Loading...</div>
      </div>

      <div class="card">
        <h3>Student Portfolio</h3>
        <div id="portfolioArea" style="margin-top:10px; color:var(--muted);">Loading...</div>
      </div>
    </div>

  </main>
</div>

<script>
  const companyId = Number(localStorage.getItem("company_id"));
  if (!companyId) {
    alert("Not logged in as company");
    window.location.href = "login.html";
  }

  const params = new URLSearchParams(window.location.search);
  const applicationId = Number(params.get("app_id"));

  if (!applicationId) {
    alert("Invalid application");
    window.location.href = "company_applicants.html";
  }

  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }

  function findDoc(documents, typeTitleCase){
    return (documents || []).find(d => String(d.doc_type) === typeTitleCase);
  }

  function renderDocBox(boxEl, doc, label){
    if (!doc) {
      boxEl.textContent = `No ${label.toLowerCase()} uploaded`;
      return;
    }

    // Portfolio can be PDF or link, depending on your backend design
    const fileUrl = doc.file_url;
    const linkUrl = doc.portfolio_link;

    const fileName = doc.file_name ? `File: ${escapeHtml(doc.file_name)}` : "";

    if (linkUrl && !fileUrl) {
      boxEl.innerHTML = `
        <a class="btn" href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener noreferrer">Open ${label}</a>
        <span style="margin-left:10px; color:var(--muted);">${fileName}</span>
      `;
      return;
    }

    if (fileUrl) {
      boxEl.innerHTML = `
        <a class="btn" href="${escapeHtml(fileUrl)}" target="_blank" rel="noopener noreferrer">View ${label}</a>
        <span style="margin-left:10px; color:var(--muted);">${fileName}</span>
      `;
      return;
    }

    boxEl.textContent = `No ${label.toLowerCase()} uploaded`;
  }

  function render(app, documents) {
    const fullName =
      `${app.first_name || ""} ${app.last_name || ""}`.trim() || "Student";
    document.getElementById("studentName").textContent = fullName;
    document.getElementById("studentEmail").textContent = app.student_email || "-";

    // ✅ This will work ONLY if backend returns motivation_letter
    document.getElementById("motivationText").textContent =
      (app.motivation_letter && String(app.motivation_letter).trim())
        ? app.motivation_letter
        : "No motivation submitted";

    const resume = findDoc(documents, "Resume");
    const transcript = findDoc(documents, "Transcript");
    const portfolio = findDoc(documents, "Portfolio");

    renderDocBox(document.getElementById("resumeArea"), resume, "Resume");
    renderDocBox(document.getElementById("transcriptArea"), transcript, "Transcript");
    renderDocBox(document.getElementById("portfolioArea"), portfolio, "Portfolio");
  }

  async function loadApplication() {
    try {
      const res = await fetch(`/api/company/${companyId}/applications/${applicationId}`);
      const out = await res.json();

      if (!res.ok || !out.ok) {
        alert(out.error || "Failed to load application");
        return;
      }

      render(out.application, out.documents || []);
    } catch (err) {
      console.error(err);
      alert("Cannot reach backend");
    }
  }

  loadApplication();
</script>

</body>
</html>
