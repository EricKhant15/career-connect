<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Role Selection - CareerConnect</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brandRow">
        <div class="logo"></div>
        <div class="brandText">CareerConnect</div>
      </div>

      <div class="profile">
        <div class="avatar">CC</div>
        <div>
          <b>Role Selection</b>
          <small>Prototype (No DB)</small>
        </div>
      </div>

      <div class="navTitle">Navigation</div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a class="active" href="login.html">Choose Role</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Role selection card -->
      <div class="card" style="grid-column: span 12;">
        <div class="cardTitle">
          <div>
            <h2>Choose a role</h2>
          </div>
        </div>

        <div class="grid" style="margin-top:14px;">
          <div class="card">
            <h3>Student</h3>
            <p>Browse internships and apply.</p>
            <div style="margin-top:12px;">
              <a class="btn btn-primary" href="student/student_dashboard.html">Continue</a>
            </div>
          </div>

          <div class="card">
            <h3>Company</h3>
            <p>Post internship opportunities.</p>
            <div style="margin-top:12px;">
              <a class="btn btn-primary" href="company_dashboard.html">Continue</a>
            </div>
          </div>

          <div class="card">
            <h3>Admin</h3>
            <p>Manage users and review overview.</p>
            <div style="margin-top:12px;">
              <a class="btn btn-primary" href="admin_dashboard.html">Continue</a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
