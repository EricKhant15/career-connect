<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Role Selection - CareerConnect</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>CareerConnect</div>
        <div class="badge">Role Selection</div>
      </div>
      <a class="btn btn-ghost" href="index.html">Back</a>
    </div>

    <div class="panel">
      <h2 style="margin:0 0 6px;">Choose a role</h2>
      <p style="margin:0 0 14px; color:var(--muted);">
        This prototype demonstrates workflows and transitions for each user role.
      </p>

      <div class="grid" style="margin-top:0;">
        <div class="card">
          <h3>Student</h3>
          <p>Browse internships and apply.</p>
          <a class="btn btn-primary" href="student_dashboard.html">Continue</a>
        </div>
        <div class="card">
          <h3>Company</h3>
          <p>Post internship opportunities.</p>
          <a class="btn btn-primary" href="company_dashboard.html">Continue</a>
        </div>
        <div class="card">
          <h3>Admin</h3>
          <p>Manage users and review overview.</p>
          <a class="btn btn-primary" href="admin_dashboard.html">Continue</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
